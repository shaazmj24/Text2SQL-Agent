metric_family: product_activity

description: >
  Product activity metrics are calculated from the events table.
  These metrics measure user engagement and behavior inside the product.

source_table: events

default_date_column: events.created_at

required_columns:
  - events.user_id
  - events.event_type
  - events.page
  - events.created_at

metrics:

  total_events:
    description: >
      Total number of events generated by users.

    formula: COUNT(*)

    sql_expression: COUNT(*)

    use_when:
      - User asks about activity volume.
      - User asks about total events.
      - User asks how many actions users performed.

  daily_active_users:
    description: >
      Number of unique users who generated at least one event
      during a selected day.

    formula: COUNT(DISTINCT events.user_id)

    sql_expression: COUNT(DISTINCT events.user_id)

    use_when:
      - User asks for DAU.
      - User asks for daily active users.
      - User asks how many users used the product on a given day.

  feature_usage:
    description: >
      Number of times a specific feature or event type was used.

    formula: COUNT(*)

    sql_expression: COUNT(*)

    use_when:
      - User asks which features are most used.
      - User asks feature adoption questions.
      - User asks usage of a specific feature.

  page_views:
    description: >
      Number of events grouped by page.

    formula: COUNT(*)

    sql_expression: COUNT(*)

    use_when:
      - User asks for page views.
      - User asks which pages are most visited.
      - User asks about page popularity.

allowed_breakdowns:

  by_event_fields:
    - events.event_type
    - events.page

  by_user_fields_requires_join_users:
    join: events.user_id = users.id

    fields:
      - users.country
      - users.source
      - users.plan

allowed_filters:

  event_type_filter:
    column: events.event_type

    allowed_values:
      - login
      - view_dashboard
      - view_report
      - run_query
      - export_csv
      - invite_team_member
      - upgrade_clicked

  page_filter:
    column: events.page

  country_filter:
    requires_join: users
    column: users.country

  source_filter:
    requires_join: users
    column: users.source

do_not_use:
  - Do not calculate product activity from users table.
  - Do not calculate product activity from orders table.
  - Do not calculate product activity from subscrip table.
  - Always use events table for engagement metrics.
  - Never invent event types not listed in value_context.

example_questions:

  total_events:
    - How many events occurred today?
    - Show total activity this week.
    - Total events by month.

  daily_active_users:
    - What was DAU yesterday?
    - Show daily active users this month.
    - Daily active users by country.

  feature_usage:
    - Which feature is used most?
    - How many users clicked upgrade?
    - Show feature usage by plan.
    - Most popular event type.

  page_views:
    - Which page is most visited?
    - Show page views by month.
    - Most popular pages.









